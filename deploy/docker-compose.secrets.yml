services:
  app:
    image: ghcr.io/agentlx/agentlx:v1.0.5
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - APP_ORIGIN=${APP_ORIGIN}
      - AGENTLX_TRUST_PROXY=${AGENTLX_TRUST_PROXY:-true}
      - APP_TIME_ZONE=${APP_TIME_ZONE:-UTC}
      - TZ=${APP_TIME_ZONE:-UTC}
      - PGTZ=${APP_TIME_ZONE:-UTC}
      - DATABASE_URL=${DATABASE_URL:-}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - DATABASE_POOL_MAX=${DATABASE_POOL_MAX:-10}
      - DATABASE_CONNECT_RETRIES=${DATABASE_CONNECT_RETRIES:-30}
      - DATABASE_CONNECT_RETRY_DELAY_MS=${DATABASE_CONNECT_RETRY_DELAY_MS:-2000}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-agentlx}
      - POSTGRES_USER=${POSTGRES_USER:-agentlx}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - AGENTLX_SEED_ON_BOOT=${AGENTLX_SEED_ON_BOOT:-false}
      - AGENTLX_PENDING_TOKEN_SECRET_FILE=/run/secrets/agentlx_pending_token_secret
      - AGENTLX_MFA_ENCRYPTION_SECRET_FILE=/run/secrets/agentlx_mfa_encryption_secret
      - AGENTLX_MFA_ISSUER=${AGENTLX_MFA_ISSUER:-agentlx}
      - AGENTLX_MFA_PENDING_TTL_MINUTES=${AGENTLX_MFA_PENDING_TTL_MINUTES:-15}
      - AGENTLX_MFA_SETUP_TTL_MINUTES=${AGENTLX_MFA_SETUP_TTL_MINUTES:-15}
      - AGENTLX_MFA_ENCRYPTION_SECRET_PREVIOUS
    secrets:
      - postgres_password
      - agentlx_pending_token_secret
      - agentlx_mfa_encryption_secret
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c 'npm run db:wait && npm run db:init && npm run start'
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentlx}
      POSTGRES_USER: ${POSTGRES_USER:-agentlx}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      TZ: ${APP_TIME_ZONE:-UTC}
      PGTZ: ${APP_TIME_ZONE:-UTC}
    secrets:
      - postgres_password
    command: ["postgres", "-c", "timezone=${APP_TIME_ZONE:-UTC}"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-agentlx} -d $${POSTGRES_DB:-agentlx}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  agentlx_pending_token_secret:
    file: ./secrets/agentlx_pending_token_secret.txt
  agentlx_mfa_encryption_secret:
    file: ./secrets/agentlx_mfa_encryption_secret.txt
volumes:
  postgres_data:
