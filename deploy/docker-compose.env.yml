services:
  app:
    image: ghcr.io/agentlx/agentlx:v1.0.4
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c 'npm run db:wait && npm run db:init && npm run start'
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      TZ: ${APP_TIME_ZONE:-UTC}
      PGTZ: ${APP_TIME_ZONE:-UTC}
    command: ["postgres", "-c", "timezone=${APP_TIME_ZONE:-UTC}"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-agentlx} -d $${POSTGRES_DB:-agentlx}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
