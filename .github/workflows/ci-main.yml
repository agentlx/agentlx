name: CI Main

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentlx
          POSTGRES_USER: agentlx
          POSTGRES_PASSWORD: agentlx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentlx -d agentlx"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      APP_ORIGIN: http://localhost:3000
      APP_TIME_ZONE: UTC
      DATABASE_URL: postgresql://agentlx:agentlx@localhost:5432/agentlx
      DATABASE_SSL: "false"
      AGENTLX_PENDING_TOKEN_SECRET: ci-pending-token-secret-32-chars
      AGENTLX_MFA_ENCRYPTION_SECRET: ci-mfa-encryption-secret-32-chars
      AGENTLX_SEED_ON_BOOT: "false"
    steps:
      - name: Checkout public repository
        run: |
          git init .
          git remote add origin https://github.com/${GITHUB_REPOSITORY}.git
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run db:init
      - run: npm run build
      - run: docker build -t agentlx:test .
