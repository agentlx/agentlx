name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repository
        run: |
          git init .
          git remote add origin https://github.com/${GITHUB_REPOSITORY}.git
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
      - name: Extract changelog notes
        id: changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            index($0, "## " version " - ") == 1 {
              found=1
              next
            }
            found && /^## / {
              exit
            }
            found {
              print
            }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d' > release-notes.md

          if [ ! -s release-notes.md ]; then
            {
              echo "Release ${GITHUB_REF_NAME}"
              echo
              echo "See CHANGELOG.md for details."
            } > release-notes.md
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentlx
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=agentlx
            org.opencontainers.image.description=Open source Linux operations hub with web panel and Python agent runtime
            org.opencontainers.image.licenses=Apache-2.0
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: agentlx ${{ github.ref_name }}
          body_path: release-notes.md
          make_latest: true
